<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - SGL</title>
</head>
<body style="font-family:sans-serif;padding:20px">

<h2>Cadastro de Produto</h2>

<input type="hidden" id="docId">

<input type="text" id="nome" placeholder="Nome"><br><br>
<input type="text" id="descricao" placeholder="Descrição"><br><br>
<input type="text" id="preco" placeholder="Preço"><br><br>
<input type="text" id="imagem" placeholder="URL da imagem"><br><br>

<button onclick="salvar()">Salvar / Atualizar</button>

<hr>

<h3>Produtos cadastrados</h3>
<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEYntSBEXEv58NV_Eck53HDG3CuzdlwhQ",
  authDomain: "sgl-uber-store.firebaseapp.com",
  projectId: "sgl-uber-store",
  storageBucket: "sgl-uber-store.firebasestorage.app",
  messagingSenderId: "225084657523",
  appId: "1:225084657523:web:30e89e1f048fd1fd40bf06"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const lista = document.getElementById("lista");

db.collection("produtos").onSnapshot(snapshot => {
    lista.innerHTML = "";
    snapshot.forEach(doc => {
        const p = doc.data();
        lista.innerHTML += `
            <div style="margin-bottom:10px;">
                <b>${p.nome}</b> - R$ ${p.preco}
                <button onclick="editar('${doc.id}','${p.nome}','${p.descricao}','${p.preco}','${p.imagem}')">✏️</button>
                <button onclick="excluir('${doc.id}')">🗑</button>
            </div>
        `;
    });
});

function salvar() {
    const id = document.getElementById("docId").value;
    const produto = {
        nome: nome.value,
        descricao: descricao.value,
        preco: preco.value,
        imagem: imagem.value
    };

    if (id) {
        db.collection("produtos").doc(id).update(produto);
        alert("Produto atualizado!");
    } else {
        db.collection("produtos").add(produto);
        alert("Produto cadastrado!");
    }

    document.getElementById("docId").value = "";
    document.querySelectorAll("input").forEach(i => i.value = "");
}

function editar(id, nomeP, descricaoP, precoP, imagemP) {
    document.getElementById("docId").value = id;
    nome.value = nomeP;
    descricao.value = descricaoP;
    preco.value = precoP;
    imagem.value = imagemP;
}

function excluir(id) {
    if (confirm("Deseja excluir este produto?")) {
        db.collection("produtos").doc(id).delete();
    }
}
</script>

</body>
</html>
