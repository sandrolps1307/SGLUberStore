<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGL Uber Store</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

.app-container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
    margin-bottom: 30px;
}

.subtitle {
    color: #ff6a00;
}

.card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(255,106,0,0.15);
}

.card img {
    width: 100%;
    border-radius: 15px;
}

.price {
    color: #ff6a00;
    font-weight: bold;
    margin-top: 8px;
}

.pix-card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(255,106,0,0.25);
}

.copy-btn {
    background-color: #ff6a00;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app-container">

    <div class="header">
        <h1>SGL Uber Store</h1>
        <div class="subtitle">🔋 Esqueceu seu carregador? Temos aqui.</div>
    </div>

    <div id="products"></div>

    <div class="pix-card">
        <h3>💳 Pagamento via Pix</h3>
        <img src="pix.jpg" width="180">
        <button class="copy-btn" onclick="copyPix()">Copiar código Pix</button>
        <p id="pixCode" style="display:none;">
00020101021126360014br.gov.bcb.pix0114+55119654772485204000053039865802BR5922SANDRO GUIMARAES LOPES6009SAO PAULO622905251KJ5NZN21YP177KGJM431ETV06304068B
        </p>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEYntSBEXEv58NV_Eck53HDG3CuzdlwhQ",
  authDomain: "sgl-uber-store.firebaseapp.com",
  projectId: "sgl-uber-store",
  storageBucket: "sgl-uber-store.firebasestorage.app",
  messagingSenderId: "225084657523",
  appId: "1:225084657523:web:30e89e1f048fd1fd40bf06"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const productsDiv = document.getElementById("products");

db.collection("produtos").onSnapshot(snapshot => {
    const container = document.getElementById("produtos");
    container.innerHTML = "";

    snapshot.forEach(doc => {
        const p = doc.data();

        let estoqueInfo = "";
        let botaoCompra = "";

        if (p.estoque > 0) {
            estoqueInfo = `<p style="color:green;">Em estoque: ${p.estoque}</p>`;
            botaoCompra = `<button onclick="comprar('${doc.id}')">Comprar</button>`;
        } else {
            estoqueInfo = `<p style="color:red;">Produto esgotado</p>`;
            botaoCompra = `<button disabled style="background:#ccc;">Indisponível</button>`;
        }

        container.innerHTML += `
            <div class="card">
                <img src="${p.imagem}" width="150">
                <h3>${p.nome}</h3>
                <p>${p.descricao}</p>
                <p><b>R$ ${p.preco}</b></p>
                ${estoqueInfo}
                ${botaoCompra}
            </div>
        `;
    });
});

function copyPix() {
    const pix = document.getElementById("pixCode").innerText;
    navigator.clipboard.writeText(pix);
    alert("Código Pix copiado!");
}
</script>

</body>
</html>
