<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin - SGL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#f3f4f6;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ddd;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.btn-primary{
    background:#2563eb;
    color:white;
}
.btn-danger{
    background:#dc2626;
    color:white;
}
.btn-edit{
    background:#f59e0b;
    color:white;
}
.produto{
    padding:10px;
    border-bottom:1px solid #eee;
}
img{
    width:60px;
    border-radius:8px;
}
</style>
</head>
<body>

<h2>Painel Administrativo</h2>

<div class="card">
<input type="hidden" id="docId">

<input type="text" id="nome" placeholder="Nome do Produto">
<input type="text" id="descricao" placeholder="Descrição">
<input type="number" id="preco" placeholder="Preço">
<input type="number" id="estoque" placeholder="Quantidade em Estoque">
<input type="file" id="imagemFile">

<button class="btn-primary" onclick="salvar()">Salvar / Atualizar</button>
</div>

<div class="card">
<h3>Produtos</h3>
<div id="lista"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEYntSBEXEv58NV_Eck53HDG3CuzdlwhQ",
  authDomain: "sgl-uber-store.firebaseapp.com",
  projectId: "sgl-uber-store",
  storageBucket: "sgl-uber-store.firebasestorage.app",
  messagingSenderId: "225084657523",
  appId: "1:225084657523:web:30e89e1f048fd1fd40bf06"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const lista = document.getElementById("lista");

db.collection("produtos").onSnapshot(snapshot => {
    lista.innerHTML = "";
    snapshot.forEach(doc => {
        const p = doc.data();
        lista.innerHTML += `
        <div class="produto">
            <img src="${p.imagem}">
            <b>${p.nome}</b> - R$ ${p.preco} 
            | Estoque: ${p.estoque}
            <button class="btn-edit" onclick="editar('${doc.id}','${p.nome}','${p.descricao}','${p.preco}','${p.estoque}','${p.imagem}')">Editar</button>
            <button class="btn-danger" onclick="excluir('${doc.id}')">Excluir</button>
        </div>
        `;
    });
});

async function salvar(){
    const id = docId.value;
    const file = imagemFile.files[0];

    let imagemURL = "";

    if(file){
        const storageRef = storage.ref("produtos/"+Date.now()+"_"+file.name);
        await storageRef.put(file);
        imagemURL = await storageRef.getDownloadURL();
    }

    const produto = {
        nome: nome.value,
        descricao: descricao.value,
        preco: preco.value,
        estoque: estoque.value,
        imagem: imagemURL
    };

    if(id){
        if(!imagemURL){
            const docOld = await db.collection("produtos").doc(id).get();
            produto.imagem = docOld.data().imagem;
        }
        await db.collection("produtos").doc(id).update(produto);
        alert("Atualizado!");
    }else{
        await db.collection("produtos").add(produto);
        alert("Cadastrado!");
    }

    limpar();
}

function editar(id,n,d,p,e,img){
    docId.value = id;
    nome.value = n;
    descricao.value = d;
    preco.value = p;
    estoque.value = e;
}

function excluir(id){
    if(confirm("Deseja excluir?")){
        db.collection("produtos").doc(id).delete();
    }
}

function limpar(){
    docId.value="";
    document.querySelectorAll("input").forEach(i=>{
        if(i.type!="hidden") i.value="";
    });
}
</script>

</body>
</html>
