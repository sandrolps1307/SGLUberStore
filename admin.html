<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - SGLUberStore</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f1f3f6;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
h2{
    text-align:center;
}
.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.btn-primary{
    background:#007bff;
    color:#fff;
}
.btn-edit{
    background:#28a745;
    color:#fff;
}
.btn-danger{
    background:#dc3545;
    color:#fff;
}
.produto{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #eee;
}
.produto img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}
.produto-info{
    display:flex;
    gap:10px;
    align-items:center;
}
</style>
</head>
<body>

<div class="container">

<h2>Painel Administrativo</h2>

<div class="card">
<input type="hidden" id="docId">

<input type="text" id="nome" placeholder="Nome do Produto">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="number" id="preco" placeholder="Preço">
<input type="number" id="estoque" placeholder="Quantidade em estoque">
<input type="text" id="imagemUrl" placeholder="URL da imagem (GitHub RAW)">

<button class="btn-primary" onclick="salvarProduto()">Salvar / Atualizar</button>
</div>

<div class="card">
<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "sgl-uber-store.firebaseapp.com",
  projectId: "sgl-uber-store",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const lista = document.getElementById("listaProdutos");

async function salvarProduto(){

    const id = document.getElementById("docId").value;
    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const estoque = document.getElementById("estoque").value;
    const imagemUrl = document.getElementById("imagemUrl").value;

    if(!nome || !preco){
        alert("Preencha nome e preço");
        return;
    }

    const produto = {
        nome,
        descricao,
        preco: parseFloat(preco),
        estoque: parseInt(estoque) || 0,
        imagem: imagemUrl
    };

    if(id){
        await db.collection("produtos").doc(id).update(produto);
        alert("Produto atualizado!");
    } else {
        await db.collection("produtos").add(produto);
        alert("Produto cadastrado!");
    }

    limparFormulario();
}

function limparFormulario(){
    document.getElementById("docId").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("estoque").value = "";
    document.getElementById("imagemUrl").value = "";
}

async function editar(id){
    const docSnap = await db.collection("produtos").doc(id).get();
    const p = docSnap.data();

    document.getElementById("docId").value = id;
    document.getElementById("nome").value = p.nome;
    document.getElementById("descricao").value = p.descricao;
    document.getElementById("preco").value = p.preco;
    document.getElementById("estoque").value = p.estoque;
    document.getElementById("imagemUrl").value = p.imagem;
}

async function excluir(id){
    if(confirm("Deseja excluir este produto?")){
        await db.collection("produtos").doc(id).delete();
        alert("Produto excluído!");
    }
}

db.collection("produtos").onSnapshot(snapshot => {
    lista.innerHTML = "";

    snapshot.forEach(doc => {
        const p = doc.data();

        lista.innerHTML += `
        <div class="produto">
            <div class="produto-info">
                <img src="${p.imagem || ''}">
                <div>
                    <strong>${p.nome}</strong><br>
                    R$ ${p.preco}<br>
                    Estoque: ${p.estoque}
                </div>
            </div>
            <div>
                <button class="btn-edit" onclick="editar('${doc.id}')">Editar</button>
                <button class="btn-danger" onclick="excluir('${doc.id}')">Excluir</button>
            </div>
        </div>
        `;
    });
});

</script>

</body>
</html>
