<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - SGL</title>
</head>
<body style="font-family:sans-serif;padding:20px">

<h2>Cadastro de Produto</h2>

<input type="text" id="nome" placeholder="Nome"><br><br>
<input type="text" id="descricao" placeholder="Descrição"><br><br>
<input type="text" id="preco" placeholder="Preço"><br><br>
<input type="text" id="imagem" placeholder="URL da imagem"><br><br>

<button onclick="salvar()">Salvar Produto</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEYntSBEXEv58NV_Eck53HDG3CuzdlwhQ",
  authDomain: "sgl-uber-store.firebaseapp.com",
  projectId: "sgl-uber-store",
  storageBucket: "sgl-uber-store.firebasestorage.app",
  messagingSenderId: "225084657523",
  appId: "1:225084657523:web:30e89e1f048fd1fd40bf06"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function salvar() {
    db.collection("produtos").add({
        nome: document.getElementById("nome").value,
        descricao: document.getElementById("descricao").value,
        preco: document.getElementById("preco").value,
        imagem: document.getElementById("imagem").value
    });
    alert("Produto cadastrado!");
}
</script>

</body>
</html>
