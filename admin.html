<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - SGLUberStore</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
h2{
    text-align:center;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.btn{
    background:#007bff;
    color:white;
}
.btn-danger{
    background:#dc3545;
    color:white;
}
.btn-edit{
    background:#28a745;
    color:white;
}
.produto{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #eee;
}
.produto img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:6px;
}
.produto-info{
    display:flex;
    align-items:center;
    gap:10px;
}
</style>
</head>
<body>

<div class="container">

<h2>Painel Administrativo</h2>

<div class="card">
<input type="hidden" id="docId">

<input type="text" id="nome" placeholder="Nome do Produto">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="number" id="preco" placeholder="Preço">
<input type="number" id="estoque" placeholder="Quantidade em estoque">
<input type="file" id="imagemFile">

<button class="btn" onclick="salvarProduto()">Salvar / Atualizar</button>
</div>

<div class="card">
<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEYntSBEXEv58NV_Eck53HDG3CuzdlwhQ",
  authDomain: "sgl-uber-store.firebaseapp.com",
  projectId: "sgl-uber-store",
  storageBucket: "sgl-uber-store.firebasestorage.app",
  messagingSenderId: "225084657523",
  appId: "1:225084657523:web:30e89e1f048fd1fd40bf06"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const lista = document.getElementById("listaProdutos");

async function salvarProduto(){

    const id = document.getElementById("docId").value;
    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const estoque = document.getElementById("estoque").value;
    const file = document.getElementById("imagemFile").files[0];

    if(!nome || !preco){
        alert("Preencha nome e preço");
        return;
    }

    let imageUrl = "";

    if(file){
        const storageRef = storage.ref("produtos/" + Date.now() + "_" + file.name);
        await storageRef.put(file);
        imageUrl = await storageRef.getDownloadURL();
    }

    const produto = {
        nome,
        descricao,
        preco: parseFloat(preco),
        estoque: parseInt(estoque) || 0
    };

    if(imageUrl){
        produto.imagem = imageUrl;
    }

    if(id){
        await db.collection("produtos").doc(id).update(produto);
        alert("Produto atualizado!");
    } else {
        await db.collection("produtos").add(produto);
        alert("Produto cadastrado!");
    }

    limparFormulario();
}

function limparFormulario(){
    document.getElementById("docId").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("estoque").value = "";
    document.getElementById("imagemFile").value = "";
}

async function editar(id){
    const docSnap = await db.collection("produtos").doc(id).get();
    const p = docSnap.data();

    document.getElementById("docId").value = id;
    document.getElementById("nome").value = p.nome;
    document.getElementById("descricao").value = p.descricao;
    document.getElementById("preco").value = p.preco;
    document.getElementById("estoque").value = p.estoque;
}

async function excluir(id){
    if(confirm("Deseja excluir este produto?")){
        await db.collection("produtos").doc(id).delete();
        alert("Produto excluído!");
    }
}

db.collection("produtos").onSnapshot(snapshot => {
    lista.innerHTML = "";

    snapshot.forEach(doc => {
        const p = doc.data();

        lista.innerHTML += `
        <div class="produto">
            <div class="produto-info">
                <img src="${p.imagem || ''}">
                <div>
                    <strong>${p.nome}</strong><br>
                    R$ ${p.preco}<br>
                    Estoque: ${p.estoque}
                </div>
            </div>
            <div>
                <button class="btn-edit" onclick="editar('${doc.id}')">Editar</button>
                <button class="btn-danger" onclick="excluir('${doc.id}')">Excluir</button>
            </div>
        </div>
        `;
    });
});
</script>

</body>
</html>
